services:
  postgres:
    image: postgres:16-alpine
    container_name: mam_postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mam_secret}
      POSTGRES_DB: ${POSTGRES_DB:-music_academy}
    volumes:
      - ./${DATA_DIR:-data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mam} -d ${POSTGRES_DB:-music_academy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mam_redis
    restart: unless-stopped
    network_mode: host
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - ./${DATA_DIR:-data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      network: host
    container_name: mam_backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-mam}:${POSTGRES_PASSWORD:-mam_secret}@localhost:5432/${POSTGRES_DB:-music_academy}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@localhost:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecretrefreshjwtkey_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 4000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    volumes:
      - ./backend:/app
      - ./${DATA_DIR:-data}/backend_node_modules:/app/node_modules
      - ./${DATA_DIR:-data}/backend_dist:/app/dist
      - ./${DATA_DIR:-data}/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      network: host
    container_name: mam_frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:4000}
      BACKEND_URL: http://localhost:4000
      VITE_WATCH_POLL: "1000"
    volumes:
      - ./frontend:/app
      - ./${DATA_DIR:-data}/frontend_node_modules:/app/node_modules
      - ./${DATA_DIR:-data}/frontend_vite_cache:/app/.vite

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      network: host
    container_name: mam_nginx
    restart: unless-stopped
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./${DATA_DIR:-data}/uploads:/var/www/uploads:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  playwright:
    build:
      context: ./e2e
      dockerfile: Dockerfile
      network: host
    container_name: mam_playwright
    network_mode: host
    profiles:
      - e2e
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      BASE_URL: ${PLAYWRIGHT_BASE_URL:-http://localhost}
      ADMIN_EMAIL: ${PLAYWRIGHT_ADMIN_EMAIL:-admin@hirondelles-musique.fr}
      ADMIN_PASSWORD: ${PLAYWRIGHT_ADMIN_PASSWORD:-Admin1234!}
    volumes:
      - ./e2e:/e2e
      - ./${DATA_DIR:-data}/e2e_node_modules:/e2e/node_modules
      - ./${DATA_DIR:-data}/playwright_results:/results
      - ./${DATA_DIR:-data}/playwright_cache:/root/.cache/ms-playwright
